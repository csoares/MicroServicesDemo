version: '3.9'

services:

  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: postgres   # default db; actual dbs created in init scripts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - demo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: demo-rabbitmq
    # default credentials: guest / guest
    ports:
      - "15672:15672"   # management UI — open http://localhost:15672 in class
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # MinIO — S3-compatible object storage
  # Replaces the shared Docker volume used previously.
  # Teaching moment: object storage vs. filesystem, presigned URLs, bucket policies.
  minio:
    image: minio/minio:latest
    container_name: demo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"     # MinIO Console UI — open http://localhost:9001 in class
    volumes:
      - minio_data:/data
    networks:
      - demo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15

  # One-shot init container — creates the 'photos' bucket and sets it public.
  # Retries until MinIO is reachable, then exits cleanly.
  minio-init:
    image: minio/mc:latest
    container_name: demo-minio-init
    networks:
      - demo-net
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        echo 'Waiting for MinIO to be ready...'; sleep 2;
      done &&
      mc mb --ignore-existing local/photos &&
      mc anonymous set public local/photos &&
      echo 'MinIO bucket ready'
      "

  # ─────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────

  # 1. Auth Service — Go + Gin
  auth-service:
    build: ./auth-service
    container_name: demo-auth
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: demo
      DB_PASSWORD: demo123
      DB_NAME: auth_db
      JWT_SECRET: supersecretkey-change-in-production   # teaching moment: don't hardcode secrets
      PORT: "8001"
    networks:
      - demo-net
    depends_on:
      postgres:
        condition: service_healthy

  # 2. Gallery Service — Node.js + Express
  gallery-service:
    build: ./gallery-service
    container_name: demo-gallery
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: demo
      DB_PASSWORD: demo123
      DB_NAME: gallery_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: photos
      PORT: "8002"
    networks:
      - demo-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # 3. Image Processing Service — Python + FastAPI
  image-processor:
    build: ./image-processor
    container_name: demo-processor
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: photos
      PROCESSING_DELAY: "8"   # seconds — set to 0 to disable, increase for slower demos
    networks:
      - demo-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: demo-frontend
    ports:
      - "3000:80"     # open http://localhost:3000 to use the app
    networks:
      - demo-net
    depends_on:
      - auth-service
      - gallery-service

# ─────────────────────────────────────────
# Shared resources
# ─────────────────────────────────────────

volumes:
  postgres_data:
  minio_data:     # MinIO object storage (replaces the uploads named volume)

networks:
  demo-net:
    driver: bridge
