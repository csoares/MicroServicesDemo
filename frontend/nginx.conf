server {
    listen 80;
    server_name localhost;

    # Serve static HTML/CSS/JS files
    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse proxy to microservices ──────────────────────────────────────
    # All API calls come through Nginx, making everything same-origin from
    # the browser's perspective. No CORS headers needed on the backend.

    # Auth Service (Go + Gin)
    location /api/auth/ {
        proxy_pass         http://auth-service:8001/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Gallery Service (Node.js + Express)
    location /api/photos/ {
        proxy_pass         http://gallery-service:8002/photos/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size 20M;  # allow large image uploads
    }

    # ── Serve images from MinIO (S3-compatible object storage) ───────────────
    # Nginx proxies /uploads/* → MinIO bucket 'photos'.
    # The 'photos' bucket is set to public-read by the minio-init container,
    # so no auth headers are needed here.
    # Teaching note: in production you would use presigned URLs instead of a
    # public bucket — this keeps the demo simple.
    location /uploads/ {
        proxy_pass         http://minio:9000/photos/;
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        add_header         Cache-Control     "public, max-age=3600";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
