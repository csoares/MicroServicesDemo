<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PhotoDemo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <p class="subtitle">Handled by <span class="badge go">Go + Gin</span> Auth Service</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="alice@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Login</button>
      <div id="error" class="error hidden"></div>
    </form>

    <p class="link">No account? <a href="/register.html">Register</a></p>

    <div class="flow-hint">
      <strong>What happens:</strong>
      <code>POST /api/auth/login</code> → Nginx → auth-service (Go) → PostgreSQL verify → JWT response
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
