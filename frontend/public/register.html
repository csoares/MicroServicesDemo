<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PhotoDemo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Handled by <span class="badge go">Go + Gin</span> Auth Service</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="alice" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="alice@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password <small>(min 6 chars)</small></label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Register</button>
      <div id="error"   class="error   hidden"></div>
      <div id="success" class="success hidden"></div>
    </form>

    <p class="link">Already have an account? <a href="/login.html">Login</a></p>

    <div class="flow-hint">
      <strong>What happens:</strong>
      <code>POST /api/auth/register</code> → Nginx → auth-service (Go) → bcrypt password → PostgreSQL insert
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
